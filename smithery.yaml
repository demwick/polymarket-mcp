startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      COPY_MODE:
        type: string
        enum: ["preview", "live"]
        default: "preview"
        description: "Trading mode: preview (simulated) or live (real orders)"
      DAILY_BUDGET:
        type: string
        default: "20"
        description: "Maximum daily spending limit in USDC"
      MIN_CONVICTION:
        type: string
        default: "3"
        description: "Minimum trade size in USDC to copy"
      POLY_API_KEY:
        type: string
        description: "Polymarket CLOB API key (live mode only)"
      POLY_API_SECRET:
        type: string
        description: "Polymarket CLOB API secret (live mode only)"
      POLY_API_PASSPHRASE:
        type: string
        description: "Polymarket CLOB API passphrase (live mode only)"
      POLY_PRIVATE_KEY:
        type: string
        description: "Polymarket wallet private key (live mode only)"
    required: []
  commandFunction: |
    (config) => ({
      command: "npx",
      args: ["polymarket-trader-mcp"],
      env: {
        ...(config.COPY_MODE && { COPY_MODE: config.COPY_MODE }),
        ...(config.DAILY_BUDGET && { DAILY_BUDGET: config.DAILY_BUDGET }),
        ...(config.MIN_CONVICTION && { MIN_CONVICTION: config.MIN_CONVICTION }),
        ...(config.POLY_API_KEY && { POLY_API_KEY: config.POLY_API_KEY }),
        ...(config.POLY_API_SECRET && { POLY_API_SECRET: config.POLY_API_SECRET }),
        ...(config.POLY_API_PASSPHRASE && { POLY_API_PASSPHRASE: config.POLY_API_PASSPHRASE }),
        ...(config.POLY_PRIVATE_KEY && { POLY_PRIVATE_KEY: config.POLY_PRIVATE_KEY }),
      }
    })
